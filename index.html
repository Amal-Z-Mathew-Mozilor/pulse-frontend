<!doctype html>
<html lang="en">
  <head>
    <!-- Google Consent Mode v2 defaults — MUST run before the CookieYes script.
         Denies all storage by default; CookieYes flips these to granted when the
         user accepts. wait_for_update gives CookieYes time to load first. -->
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag() { dataLayer.push(arguments); }
      gtag('consent', 'default', {
        ad_storage: 'denied',
        ad_user_data: 'denied',
        ad_personalization: 'denied',
        analytics_storage: 'denied',
        functionality_storage: 'denied',
        personalization_storage: 'denied',
        security_storage: 'granted',
        wait_for_update: 2000
      });
      gtag('set', 'ads_data_redaction', true);
      gtag('set', 'url_passthrough', true);
    </script>

    <!-- Start cookieyes banner -->
    <script id="cookieyes" type="text/javascript" src="https://cdn-cookieyes.com/client_data/6623c73f9e196e4a46fe4ebb57e2c061/script.js"></script>
    <!-- End cookieyes banner -->

    <!-- Start CookieYes cookie policy -->
    <script id="cky-cookie-policy" type="text/javascript" src="https://cdn-cookieyes.com/client_data/6623c73f9e196e4a46fe4ebb57e2c061/cookie-policy/script.js"></script>
    <!-- End CookieYes cookie policy -->

    <!-- Google tag (gtag.js) — MUST be a static tag immediately after CookieYes
         (CookieYes GCM checker requires order: consent default -> CookieYes -> gtag).
         Reuses the gtag()/dataLayer defined in the consent-default block above. -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-MVHVSGV5FP"></script>
    <script>
      gtag('js', new Date());
      gtag('config', 'G-MVHVSGV5FP');
    </script>

    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pulse — Organizational Memory</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
