<!doctype html>
<html lang="en">
  <head>
    <!-- Google Consent Mode v2 defaults — MUST run before the CookieYes script.
         Denies all storage by default; CookieYes flips these to granted when the
         user accepts. wait_for_update gives CookieYes time to load first. -->
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag() { dataLayer.push(arguments); }
      gtag('consent', 'default', {
        'analytics_storage': 'denied',
        'ad_storage': 'denied',
        'ad_user_data': 'denied',
        'ad_personalization': 'denied',
        'wait_for_update': 500
      });
    </script>

    <!-- Start cookieyes banner -->
    <script id="cookieyes" type="text/javascript" src="https://cdn-cookieyes.com/client_data/72ec13e8cdfaf086bcdee2888644eb1d/script.js"></script>
    <!-- End cookieyes banner -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pulse — Organizational Memory</title>
  </head>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
